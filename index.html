<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randomizer</title>
    <script src="script.js"></script>
    <link rel='stylesheet' href="style.css">
</head>
<body><div class="container">
    <h1 id="rezultat">?</h1>
    <p id="opis">Unesi opseg i izaberi tip broja</p>

    <div class="input-grupa">
        <div class="input-row">
            <label for="min">Min:</label>
            <input type="number" id="min" placeholder="npr. 2">
        </div>

        <div class="input-row">
            <label for="max">Max:</label>
            <input type="number" id="max" placeholder="npr. 8">
        </div>
    </div>

    <div class="radio-grupa">
        <label><input type="radio" name="tip" value="svi" checked> Svi</label>
        <label><input type="radio" name="tip" value="parni"> Parni</label>
        <label><input type="radio" name="tip" value="neparni"> Neparni</label>
    </div>

		
    <button id="btn" onclick="generisi()">Generiši</button>
</div>
</body>
</html>
